<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a 30-min Call — Jeffrey Farañal</title>
    <meta name="description" content="Schedule a free 30-minute call with Jeffrey Farañal, UI/UX Manager and AI Designer.">
    <meta property="og:title" content="Book a 30-min Call — Jeffrey Farañal">
    <meta property="og:description" content="Pick a date and time that works for you. I'll send a calendar invite right away.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://puttstrife.github.io/booking">
    <link rel="icon" type="image/x-icon" href="images/icon-fabIcon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.cdnfonts.com">
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/montserrat">
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/open-sans">
    <style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
    font-family: 'Montserrat', 'Segoe UI', sans-serif;
    background: #F5F5FA;
    color: #111;
    scroll-behavior: smooth;
}

body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 52px 20px 80px;
}

/* ── Page header ── */
.page-header {
    text-align: center;
    margin-bottom: 32px;
    animation: fade-up 0.5s ease both;
}

.page-header .avatar {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(16px) saturate(180%);
    -webkit-backdrop-filter: blur(16px) saturate(180%);
    border: 1.5px solid rgba(255, 255, 255, 0.7);
    box-shadow: 0 2px 12px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: #333;
    margin: 0 auto 16px;
    letter-spacing: 0.5px;
}

.page-header h1 {
    font-family: 'Open Sans', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: #111;
    margin-bottom: 8px;
}

.page-header p {
    font-size: 14px;
    color: #888;
    line-height: 1.65;
    max-width: 360px;
    margin: 0 auto;
}

/* ── Booking card ── */
.booking-card {
    background: #fff;
    border-radius: 22px;
    padding: 32px;
    width: 100%;
    max-width: 600px;
    box-shadow: 0 4px 40px rgba(0, 0, 0, 0.07);
    animation: fade-up 0.5s 0.08s ease both;
}

@keyframes fade-up {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* ── Back link ── */
.back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: #888;
    text-decoration: none;
    margin-bottom: 28px;
    transition: color 0.15s;
    align-self: flex-start;
    max-width: 600px;
    width: 100%;
}
.back-link:hover { color: #333; }

/* ── Calendar ── */
.custom-calendar {
    background: #f9f9fb;
    border-radius: 14px;
    padding: 20px;
}

.cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
}

.cal-month-label {
    font-family: 'Open Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #111;
}

.cal-nav {
    background: none;
    border: none;
    font-size: 20px;
    color: #666;
    cursor: pointer;
    padding: 2px 10px;
    border-radius: 6px;
    transition: background 0.15s;
    line-height: 1;
}
.cal-nav:hover:not(:disabled) { background: #e8e8e8; }
.cal-nav:disabled { color: #ddd; cursor: default; }

.cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 6px;
}
.cal-weekdays span {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: #bbb;
    text-transform: uppercase;
    letter-spacing: 0.3px;
}

.cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
}

.cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    border-radius: 8px;
}
.cal-day.available { color: #111; cursor: pointer; transition: background 0.15s; }
.cal-day.available:hover { background: #e8e8e8; }
.cal-day.selected { background: #111; color: #fff !important; }
.cal-day.disabled { color: #ddd; cursor: default; }

.cal-body {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    align-items: start;
}
.cal-grid-col { min-width: 0; }

.cal-time-col {
    width: 140px;
    border-left: 1px solid #e8e8e8;
    padding-left: 20px;
}

.cal-timeslot-label {
    font-size: 11px;
    font-weight: 700;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 12px;
}

.cal-times {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.cal-tz-note {
    font-size: 11px;
    line-height: 1.45;
    color: #9a9a9a;
    margin: -2px 0 10px;
}

.cal-time {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: #555;
    background: #fff;
    border: 1.5px solid #e0e0e0;
    padding: 8px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
}
.cal-time:hover  { border-color: #111; color: #111; }
.cal-time.selected { background: #111; border-color: #111; color: #fff; }

.cal-time-local { font-size: 12px; font-weight: 600; line-height: 1.1; }
.cal-time-thai  { font-size: 10px; font-weight: 400; opacity: 0.55; line-height: 1.1; }
.cal-day-offset { font-size: 10px; font-weight: 700; opacity: 0.65; margin-left: 4px; }
.cal-time.selected .cal-day-offset { opacity: 0.85; }
.cal-time.selected .cal-time-thai  { opacity: 0.7; }

.cal-schedule-btn-wrap { margin-top: 24px; text-align: center; }
.cal-schedule-btn {
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    background: #111;
    border: none;
    padding: 13px 36px;
    border-radius: 50px;
    cursor: pointer;
    transition: background 0.2s;
}
.cal-schedule-btn:hover { background: #333; }

/* ── Modal ── */
.cal-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.cal-modal-overlay.open {
    display: flex;
    animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.cal-modal {
    background: #fff;
    border-radius: 20px;
    padding: 36px;
    width: 100%;
    max-width: 440px;
    max-height: 90vh;
    max-height: 90dvh;
    overflow-y: auto;
    position: relative;
    box-shadow: 0 24px 64px rgba(0, 0, 0, 0.18);
    animation: slideUp 0.25s ease;
}
@keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
}

.cal-modal-close {
    position: absolute;
    top: 16px;
    right: 20px;
    background: none;
    border: none;
    font-size: 20px;
    color: #aaa;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
    line-height: 1;
}
.cal-modal-close:hover { color: #111; background: #f0f0f0; }

.cal-modal-header {
    margin-bottom: 24px;
    padding-right: 36px;
}
.cal-modal-header h3 {
    font-family: 'Open Sans', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: #111;
    margin: 0 0 4px;
}
.cal-modal-header p {
    font-size: 13px;
    color: #888;
    margin: 0;
}

/* ── Booking form ── */
.cal-booking-form {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid #e8e8e8;
    display: flex;
    flex-direction: column;
    gap: 12px;
}
.cal-field-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 100%;
}
.cal-booking-form input {
    font-family: 'Montserrat', sans-serif;
    font-size: 16px;
    color: #111;
    background: #fff;
    border: 1.5px solid #e8e8e8;
    border-radius: 10px;
    padding: 10px 14px;
    outline: none;
    width: 100%;
    box-sizing: border-box;
    transition: border-color 0.2s;
}
.cal-booking-form input:focus { border-color: #555; }
.cal-booking-form input::placeholder { color: #bbb; }

.cal-confirm-btn {
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    background: #111;
    border: none;
    padding: 12px;
    border-radius: 50px;
    cursor: pointer;
    transition: background 0.2s;
}
.cal-confirm-btn:hover { background: #333; }
.cal-confirm-btn:disabled { background: #aaa; cursor: not-allowed; }

.field-error {
    font-size: 12px;
    color: #d93025;
    font-weight: 500;
    padding-left: 2px;
}
.input-error {
    border-color: #d93025 !important;
    background: #fff5f5 !important;
}

/* ── Success ── */
.cal-success {
    text-align: center;
    padding: 24px 0 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}
.cal-success h4 {
    font-family: 'Open Sans', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: #111;
    margin: 0;
}
.cal-success p {
    font-size: 13px;
    color: #888;
    line-height: 1.6;
}

/* ── Retro mail animation ── */
@keyframes mail-bounce-in {
    0%   { transform: scale(0.5) translateY(20px); opacity: 0; }
    65%  { transform: scale(1.08) translateY(-4px); opacity: 1; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
}
@keyframes mail-flap-open {
    0%   { transform: scaleY(1); }
    100% { transform: scaleY(-1); }
}
@keyframes mail-letter-rise {
    0%   { transform: translateY(40px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
}
@keyframes mail-star-pop {
    0%   { transform: scale(0); opacity: 0; }
    60%  { transform: scale(1.3); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
}
@keyframes mail-dot-blink {
    0%, 100% { opacity: 0.25; }
    50% { opacity: 1; }
}
@keyframes mail-hover {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
}
.retro-mail-svg {
    display: block; margin: 0 auto 4px;
    image-rendering: pixelated; image-rendering: crisp-edges;
    animation: mail-bounce-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both,
               mail-hover 3s ease-in-out 1.3s infinite;
}
.mail-flap        { transform-box: fill-box; transform-origin: center top; animation: mail-flap-open 0.35s ease-in-out 0.3s both; }
.mail-letter-group { animation: mail-letter-rise 0.4s ease-out 0.55s both; }
.mail-star-1 { transform-box: fill-box; transform-origin: center; animation: mail-star-pop 0.28s ease 0.72s both; }
.mail-star-2 { transform-box: fill-box; transform-origin: center; animation: mail-star-pop 0.28s ease 0.84s both; }
.mail-star-3 { transform-box: fill-box; transform-origin: center; animation: mail-star-pop 0.28s ease 0.96s both; }
.mail-dot-1  { animation: mail-dot-blink 1.1s ease-in-out 0.1s infinite; }
.mail-dot-2  { animation: mail-dot-blink 1.1s ease-in-out 0.3s infinite; }
.mail-dot-3  { animation: mail-dot-blink 1.1s ease-in-out 0.5s infinite; }

/* ── Mobile ── */
@media (max-width: 640px) {
    body { padding: 28px 16px 80px; }
    .booking-card { padding: 20px 16px; }
    .page-header h1 { font-size: 20px; }
    .cal-modal-overlay { align-items: flex-end; padding: 0; }
    .cal-modal {
        border-radius: 20px 20px 0 0;
        max-width: 100%;
        padding: 24px 18px;
        padding-bottom: max(28px, env(safe-area-inset-bottom, 28px));
    }
    .cal-modal-header { padding-right: 32px; }
    .cal-body { grid-template-columns: 1fr; }
    .cal-time-col { width: 100%; border-left: none; border-top: 1px solid #e8e8e8; padding-left: 0; padding-top: 16px; }
    .cal-times { flex-direction: row; flex-wrap: wrap; }
    .cal-time  { width: auto; }
}
    </style>
</head>
<body>

    <header class="page-header">
        <div class="avatar">JF</div>
        <h1>Book a 30-min call</h1>
        <p>Pick a date and time that works for you.<br>I'll send a calendar invite right away.</p>
    </header>

    <div class="booking-card">
        <div class="custom-calendar" id="custom-calendar"></div>
    </div>

    <!-- Booking confirmation modal -->
    <div id="booking-modal-overlay" class="cal-modal-overlay" onclick="closeBookingModal(event)">
        <div class="cal-modal">
            <button class="cal-modal-close" onclick="closeBookingModal()">✕</button>
            <div class="cal-modal-header">
                <h3>Confirm your booking</h3>
                <p id="booking-modal-subtitle"></p>
            </div>
            <div id="booking-form-container"></div>
        </div>
    </div>

    <script>
/* ─────────────────────────────────────────
   Config
───────────────────────────────────────── */
const GCAL_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyrXpvEYSzcIf7iiFMJoL48QOSYDOyFml-4JtbKICSIR7C8LhBGpaw1dT4L8IUMSEGVOg/exec';
const WEB3FORMS_KEY   = '03657e8a-ab0f-4d25-be91-76d8ad81c7b1';

/* ─────────────────────────────────────────
   Calendar data
───────────────────────────────────────── */
// Availability is defined in Bangkok time (ICT, UTC+7)
const THAI_UTC_OFFSET = 7;
const TIME_SLOTS_THAI = [
    { value: '9:00 AM',  hours: 9,  minutes: 0 },
    { value: '10:00 AM', hours: 10, minutes: 0 },
    { value: '11:00 AM', hours: 11, minutes: 0 },
    { value: '2:00 PM',  hours: 14, minutes: 0 },
    { value: '3:00 PM',  hours: 15, minutes: 0 },
    { value: '4:00 PM',  hours: 16, minutes: 0 },
];
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAY_NAMES   = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

let calYear, calMonth, calSelectedDate, calSelectedTime;

// Convert a Bangkok time slot to the visitor's local time.
// Returns { display: '3:00 AM', dayOffset: -1 | 0 | 1 }
function thaiTimeToLocal(thaiHours, thaiMinutes) {
    const visitorOffset = -new Date().getTimezoneOffset() / 60;
    let h = thaiHours + (visitorOffset - THAI_UTC_OFFSET);
    let dayOffset = 0;
    if (h >= 24) { h -= 24; dayOffset = +1; }
    if (h < 0)   { h += 24; dayOffset = -1; }
    const period = h >= 12 ? 'PM' : 'AM';
    const display = `${h % 12 || 12}:${String(thaiMinutes).padStart(2, '0')} ${period}`;
    return { display, dayOffset };
}

function getLocalTimeSlots() {
    const visitorOffset = -new Date().getTimezoneOffset() / 60;
    const isThai = visitorOffset === THAI_UTC_OFFSET;
    return TIME_SLOTS_THAI.map(slot => {
        const local = thaiTimeToLocal(slot.hours, slot.minutes);
        return {
            value:      slot.value,
            thaiLabel:  slot.value,
            localLabel: isThai ? slot.value : local.display,
            dayOffset:  local.dayOffset,
            isThai,
        };
    });
}

function localTZLabel() {
    try {
        return Intl.DateTimeFormat().resolvedOptions().timeZone.replace(/_/g, ' ');
    } catch {
        return 'your time';
    }
}

/* ─────────────────────────────────────────
   Validation
───────────────────────────────────────── */
function validateName(value) {
    const v = value.trim();
    if (!v)          return 'Name is required.';
    if (v.length < 2)  return 'Name must be at least 2 characters.';
    if (v.length > 60) return 'Name must be 60 characters or fewer.';
    if (!/^[a-zA-ZÀ-ÿ\s'\-.]+$/.test(v)) return 'Name may only contain letters, spaces, hyphens, or apostrophes.';
    return null;
}
function validateEmail(value) {
    const v = value.trim();
    if (!v) return 'Email address is required.';
    if (!/^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,}$/.test(v)) return 'Please enter a valid email address.';
    return null;
}
function showFieldError(el, msg) {
    el.classList.add('input-error');
    let err = el.parentNode.querySelector('.field-error');
    if (!err) { err = document.createElement('span'); err.className = 'field-error'; el.parentNode.appendChild(err); }
    err.textContent = msg;
}
function clearFieldError(el) {
    el.classList.remove('input-error');
    const err = el.parentNode.querySelector('.field-error');
    if (err) err.remove();
}

/* ─────────────────────────────────────────
   Modal helpers
───────────────────────────────────────── */
function openModal(id)  { document.getElementById(id).classList.add('open');    document.body.style.overflow = 'hidden'; }
function closeModal(id) { document.getElementById(id).classList.remove('open'); document.body.style.overflow = ''; }

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal('booking-modal-overlay'); });

function openBookingModal() {
    const formatted = new Date(calSelectedDate + 'T00:00:00').toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
    const slot = TIME_SLOTS_THAI.find(s => s.value === calSelectedTime);
    const local = slot ? thaiTimeToLocal(slot.hours, slot.minutes) : null;
    const isThai = (-new Date().getTimezoneOffset() / 60) === THAI_UTC_OFFSET;
    const timeDisplay = (local && !isThai)
        ? `${local.display} (${localTZLabel()}) · ${calSelectedTime} ICT`
        : `${calSelectedTime} ICT`;
    document.getElementById('booking-modal-subtitle').textContent = '📅 ' + formatted + ' · ' + timeDisplay;
    document.getElementById('booking-form-container').innerHTML = `
        <form class="cal-booking-form" id="cal-booking-form" novalidate>
            <div class="cal-field-wrap">
                <input type="text"  name="cal_name"  placeholder="Your name"  autocomplete="name">
            </div>
            <div class="cal-field-wrap">
                <input type="email" name="cal_email" placeholder="Your email" autocomplete="email">
            </div>
            <button type="submit" class="cal-confirm-btn" id="cal-confirm-btn">Confirm Booking</button>
        </form>`;
    document.getElementById('cal-booking-form').addEventListener('submit', calSubmitBooking);
    openModal('booking-modal-overlay');
}
function closeBookingModal(e) {
    if (e && e.target !== document.getElementById('booking-modal-overlay')) return;
    closeModal('booking-modal-overlay');
}

/* ─────────────────────────────────────────
   Calendar render
───────────────────────────────────────── */
function initCalendar() {
    const now = new Date();
    calYear  = now.getFullYear();
    calMonth = now.getMonth();
    renderCalendar();
}

function renderCalendar() {
    const container = document.getElementById('custom-calendar');
    if (!container) return;

    const today       = new Date(); today.setHours(0,0,0,0);
    const firstDay    = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const startOffset = (firstDay === 0) ? 6 : firstDay - 1;
    const atMinMonth  = new Date(calYear, calMonth, 1) <= today;

    let daysHtml = DAY_NAMES.map(d => `<span>${d}</span>`).join('');
    let gridHtml = '';
    for (let i = 0; i < startOffset; i++) gridHtml += `<div class="cal-day"></div>`;
    for (let d = 1; d <= daysInMonth; d++) {
        const date      = new Date(calYear, calMonth, d);
        const isWeekend = date.getDay() === 0 || date.getDay() === 6;
        const isPast    = date < today;
        const dateStr   = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isSelected = dateStr === calSelectedDate;
        const cls   = ['cal-day', isWeekend || isPast ? 'disabled' : 'available', isSelected ? 'selected' : ''].filter(Boolean).join(' ');
        const click = (!isWeekend && !isPast) ? `onclick="calPickDate('${dateStr}')"` : '';
        gridHtml += `<div class="${cls}" ${click}>${d}</div>`;
    }

    const slots = getLocalTimeSlots();
    const tzNote = slots[0].isThai ? '' : `<p class="cal-tz-note">Times shown in your timezone · Slots are ${THAI_UTC_OFFSET > 0 ? 'UTC+' + THAI_UTC_OFFSET : 'UTC' + THAI_UTC_OFFSET} Bangkok</p>`;
    const timesColHtml = calSelectedDate ? `
        <div class="cal-time-col">
            <div class="cal-timeslots">
                <p class="cal-timeslot-label">Pick a time</p>
                ${tzNote}
                <div class="cal-times">
                    ${slots.map(s => {
                        const dayTag = s.dayOffset === -1 ? ' <span class="cal-day-offset">-1d</span>'
                                     : s.dayOffset === +1 ? ' <span class="cal-day-offset">+1d</span>'
                                     : '';
                        const subLabel = s.isThai ? '' : `<span class="cal-time-thai">${s.thaiLabel} ICT</span>`;
                        return `<button class="cal-time ${s.value === calSelectedTime ? 'selected' : ''}" onclick="calPickTime('${s.value}')"><span class="cal-time-local">${s.localLabel}</span>${dayTag}${subLabel}</button>`;
                    }).join('')}
                </div>
            </div>
        </div>` : '';

    const bookingHtml = (calSelectedDate && calSelectedTime) ? `
        <div class="cal-schedule-btn-wrap">
            <button class="cal-schedule-btn" onclick="openBookingModal()">Set Schedule →</button>
        </div>` : '';

    container.innerHTML = `
        <div class="cal-header">
            <button class="cal-nav" onclick="calChangeMonth(-1)" ${atMinMonth ? 'disabled' : ''}>‹</button>
            <span class="cal-month-label">${MONTH_NAMES[calMonth]} ${calYear}</span>
            <button class="cal-nav" onclick="calChangeMonth(1)">›</button>
        </div>
        <div class="cal-body">
            <div class="cal-grid-col">
                <div class="cal-weekdays">${daysHtml}</div>
                <div class="cal-grid">${gridHtml}</div>
            </div>
            ${timesColHtml}
        </div>
        ${bookingHtml}`;
}

function calChangeMonth(dir) {
    calMonth += dir;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    if (calMonth < 0)  { calMonth = 11; calYear--; }
    renderCalendar();
}
function calPickDate(dateStr) { calSelectedDate = dateStr; calSelectedTime = null; renderCalendar(); }
function calPickTime(time)    { calSelectedTime = time; renderCalendar(); }

/* ─────────────────────────────────────────
   Submit booking
───────────────────────────────────────── */
async function calSubmitBooking(e) {
    e.preventDefault();

    const nameInput  = e.target.cal_name;
    const emailInput = e.target.cal_email;
    const name       = nameInput.value.trim();
    const email      = emailInput.value.trim();

    clearFieldError(nameInput);
    clearFieldError(emailInput);

    const nameErr  = validateName(name);
    const emailErr = validateEmail(email);
    if (nameErr)  { showFieldError(nameInput,  nameErr);  return; }
    if (emailErr) { showFieldError(emailInput, emailErr); return; }

    const btn = document.getElementById('cal-confirm-btn');
    btn.textContent = 'Booking…';
    btn.disabled    = true;

    const formatted = new Date(calSelectedDate + 'T00:00:00').toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
    const slot = TIME_SLOTS_THAI.find(s => s.value === calSelectedTime);
    const localSlot = slot ? thaiTimeToLocal(slot.hours, slot.minutes) : null;
    const isThai = (-new Date().getTimezoneOffset() / 60) === THAI_UTC_OFFSET;
    const localTimeStr = (localSlot && !isThai) ? `${localSlot.display} (${localTZLabel()})` : calSelectedTime + ' ICT';

    // Google Calendar via Apps Script
    const scriptReady = GCAL_SCRIPT_URL && !GCAL_SCRIPT_URL.startsWith('PASTE');
    let gcalOk = false;
    if (scriptReady) {
        try {
            const params = new URLSearchParams({ name, email, date: calSelectedDate, time: calSelectedTime });
            await fetch(GCAL_SCRIPT_URL + '?' + params.toString(), { mode: 'no-cors' });
            gcalOk = true;
        } catch { /* fall through */ }
    }

    // Email notification via Web3Forms
    try {
        const res  = await fetch('https://api.web3forms.com/submit', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
            body: JSON.stringify({
                access_key: WEB3FORMS_KEY,
                subject:    `📅 Meeting Request: ${name} — ${formatted} at ${calSelectedTime}`,
                name,
                email,
                message: `${name} has requested a 30-min call.\n\nDate: ${formatted}\nTime: ${calSelectedTime} ICT (Bangkok)\nTheir local time: ${localTimeStr}\nEmail: ${email}${gcalOk ? '\n\n✓ Event added to Google Calendar.' : ''}`,
            }),
        });
        const json = await res.json();
        if (!json.success) throw new Error();

        document.getElementById('booking-form-container').innerHTML = `
            <div class="cal-success">
                ${MAIL_SVG}
                <h4>You're booked!</h4>
                <p>${formatted} at ${localTimeStr}.<br>A confirmation will be sent to ${email}.</p>
            </div>`;
    } catch {
        btn.textContent = 'Failed — try again';
        btn.disabled    = false;
    }
}
