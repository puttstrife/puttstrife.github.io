<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Votive Society Candle Wall</title>
    <style>
:root {
  --vs-ink: #180f0b;
  --vs-ink-soft: #241713;
  --vs-surface: #332119;
  --vs-surface-2: #4a3022;
  --vs-cream: #fff4dd;
  --vs-muted: #d6bfa1;
  --vs-gold: #f7c66b;
  --vs-amber: #e58b38;
  --vs-red-glass: #a91914;
  --vs-red-glow: #f03524;
  --vs-stone: #7c7368;
  --vs-stone-dark: #302b27;
  --vs-wax: #f1d4a0;
  --vs-wax-dim: #9c846d;
  --vs-focus: #f7c66b;
  color-scheme: dark;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  width: 100%;
  min-height: 100vh;
  overflow: hidden;
  color: var(--vs-cream);
  background:
    radial-gradient(circle at 50% 32%, rgba(247, 198, 107, 0.12), transparent 34rem),
    linear-gradient(120deg, rgba(247, 198, 107, 0.04), transparent 28%),
    var(--vs-ink);
}

button,
input,
select {
  font: inherit;
}

.candle-page {
  position: relative;
  width: 100vw;
  max-width: 100vw;
  min-height: 100svh;
  height: 100svh;
  overflow: hidden;
  background:
    radial-gradient(circle at 50% 77%, rgba(240, 53, 36, 0.24), transparent 27rem),
    radial-gradient(circle at 50% 44%, rgba(229, 139, 56, 0.11), transparent 33rem),
    radial-gradient(circle at 18% 58%, rgba(247, 198, 107, 0.05), transparent 23rem),
    radial-gradient(circle at 83% 50%, rgba(247, 198, 107, 0.05), transparent 25rem),
    linear-gradient(180deg, rgba(12, 7, 5, 0.3), rgba(12, 7, 5, 0.86));
}

.candle-page::before {
  position: absolute;
  inset: 0;
  pointer-events: none;
  content: "";
  z-index: 4;
  opacity: 0.18;
  background-image: radial-gradient(circle at 50% 50%, rgba(255, 244, 221, 0.04) 0 1px, transparent 1px);
  background-size: 42px 42px;
  mix-blend-mode: screen;
}

.wall-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 12;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 0.8rem;
  align-items: start;
  padding: clamp(0.75rem, 2vw, 1.2rem) clamp(0.8rem, 3vw, 2rem);
  background: linear-gradient(180deg, rgba(6, 6, 5, 0.5), rgba(6, 6, 5, 0.14) 62%, transparent);
  pointer-events: none;
}

.ghost-link,
.secondary-button,
.icon-button {
  min-height: 2.5rem;
  border: 1px solid rgba(255, 244, 221, 0.08);
  color: var(--vs-cream);
  background: rgba(12, 8, 6, 0.34);
  text-decoration: none;
  border-radius: 999px;
  padding: 0.5rem 0.72rem;
  box-shadow: 0 0.7rem 1.7rem rgba(0, 0, 0, 0.18);
  backdrop-filter: blur(8px);
  pointer-events: auto;
}

.icon-button,
.secondary-button {
  cursor: pointer;
}

.icon-button {
  display: inline-flex;
  gap: 0.45rem;
  align-items: center;
}

.wall-actions {
  display: flex;
  gap: 0.42rem;
  justify-content: flex-end;
}

.wall-title {
  min-width: 0;
  text-align: center;
  color: rgba(255, 244, 221, 0.82);
  text-shadow: 0 0.2rem 1.4rem rgba(0, 0, 0, 0.74);
  pointer-events: none;
  opacity: 0.92;
  transition: opacity 220ms ease;
}

.candle-page.is-engaged .wall-title {
  opacity: 0.58;
}

.eyebrow {
  margin: 0 0 0.2rem;
  color: rgba(247, 198, 107, 0.78);
  font-size: 0.64rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

h1 {
  margin: 0;
  font-family: Georgia, "Times New Roman", serif;
  font-size: clamp(1.18rem, 2.2vw, 1.9rem);
  font-weight: 500;
  letter-spacing: 0;
}

.wall-title p:last-child {
  margin: 0.25rem 0 0;
  color: rgba(214, 191, 161, 0.76);
  font-size: 0.78rem;
}

.controls-panel {
  position: fixed;
  top: clamp(4.6rem, 8vw, 5.7rem);
  left: 50%;
  z-index: 13;
  display: grid;
  grid-template-columns: minmax(14rem, 1fr) repeat(2, minmax(9rem, 12rem));
  gap: 0.75rem;
  width: min(58rem, calc(100vw - 2rem));
  margin: 0;
  padding: 0.75rem;
  border: 1px solid rgba(255, 244, 221, 0.08);
  border-radius: 0.5rem;
  background: rgba(10, 7, 5, 0.62);
  box-shadow: 0 1.5rem 3rem rgba(0, 0, 0, 0.22);
  backdrop-filter: blur(12px);
  transform: translateX(-50%);
}

.controls-panel[hidden] {
  display: none;
}

.controls-panel label {
  display: grid;
  gap: 0.35rem;
  color: var(--vs-muted);
  font-size: 0.78rem;
}

.controls-panel input,
.controls-panel select {
  width: 100%;
  border: 1px solid rgba(255, 244, 221, 0.18);
  border-radius: 0.35rem;
  color: var(--vs-cream);
  background: rgba(0, 0, 0, 0.22);
  padding: 0.7rem 0.75rem;
}

.wall-environment {
  position: absolute;
  inset: 0;
  width: 100vw;
  height: 100%;
  margin: 0;
  overflow-x: auto;
  overflow-y: hidden;
  border: 0;
  cursor: grab;
  overscroll-behavior-x: contain;
  scrollbar-width: none;
  touch-action: pan-x;
  user-select: none;
  background:
    radial-gradient(ellipse at 50% 82%, rgba(240, 53, 36, 0.34), transparent 38%),
    radial-gradient(ellipse at 48% 72%, rgba(247, 198, 107, 0.18), transparent 43%),
    radial-gradient(ellipse at 50% 24%, rgba(12, 42, 72, 0.42), transparent 34%),
    linear-gradient(100deg, rgba(255, 255, 255, 0.03), transparent 24%, rgba(255, 255, 255, 0.02) 58%, transparent),
    linear-gradient(180deg, #07121d 0%, #15130f 32%, #241812 62%, #130807 100%);
  box-shadow: inset 0 3rem 5rem rgba(0, 0, 0, 0.32), inset 0 -4rem 6rem rgba(0, 0, 0, 0.7);
}

.wall-environment.is-dragging {
  cursor: grabbing;
}

.wall-environment::-webkit-scrollbar {
  display: none;
}

.garden-backdrop {
  position: fixed;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
}

.garden-backdrop::before {
  position: absolute;
  inset: 0;
  content: "";
  background:
    radial-gradient(circle at 18% 32%, rgba(174, 181, 139, 0.22), transparent 16rem),
    radial-gradient(circle at 78% 33%, rgba(133, 159, 121, 0.16), transparent 17rem),
    radial-gradient(circle at 50% 16%, rgba(0, 76, 166, 0.26), transparent 18rem);
}

.tree,
.tree::before,
.tree::after {
  position: absolute;
  width: 0.28rem;
  border-radius: 999px;
  background: linear-gradient(180deg, rgba(125, 111, 85, 0.7), rgba(36, 23, 17, 0.9));
  content: "";
}

.tree {
  bottom: 25%;
  height: 41%;
  opacity: 0.55;
  transform-origin: bottom;
}

.tree::before {
  bottom: 32%;
  left: -2.2rem;
  height: 55%;
  transform: rotate(-21deg);
}

.tree::after {
  bottom: 26%;
  right: -1.9rem;
  height: 49%;
  transform: rotate(18deg);
}

.tree-left {
  left: 17%;
  transform: rotate(3deg);
}

.tree-center {
  left: 50%;
  height: 36%;
  opacity: 0.38;
  transform: rotate(-5deg);
}

.tree-right {
  right: 15%;
  height: 45%;
  opacity: 0.5;
  transform: rotate(-8deg);
}

.stone-wall {
  position: absolute;
  left: -4vw;
  right: -4vw;
  bottom: 20%;
  height: 7rem;
  background:
    linear-gradient(180deg, rgba(124, 115, 104, 0.5), rgba(48, 43, 39, 0.68));
  background-size: auto;
  box-shadow: inset 0 1rem 1.2rem rgba(255, 255, 255, 0.05), inset 0 -1.5rem 2rem rgba(0, 0, 0, 0.42);
  clip-path: polygon(0 18%, 100% 0, 100% 100%, 0 100%);
}

.map-environment {
  position: absolute;
  inset: 0;
  width: 100vw;
  height: 100%;
  margin: 0;
  overflow: hidden;
  border: 0;
  border-radius: 0;
  background:
    radial-gradient(circle at 50% 52%, rgba(247, 198, 107, 0.14), transparent 28rem),
    radial-gradient(circle at 22% 36%, rgba(229, 139, 56, 0.1), transparent 20rem),
    linear-gradient(145deg, rgba(255, 255, 255, 0.045), transparent 30%),
    linear-gradient(180deg, #2b1c16, #120a08);
  box-shadow: inset 0 3rem 5rem rgba(0, 0, 0, 0.42), inset 0 -4rem 6rem rgba(0, 0, 0, 0.7);
}

.map-environment[hidden] {
  display: none;
}

.map-environment::before {
  position: absolute;
  inset: 0;
  content: "";
  pointer-events: none;
  background:
    linear-gradient(90deg, rgba(0, 0, 0, 0.5), transparent 16%, transparent 84%, rgba(0, 0, 0, 0.52)),
    radial-gradient(circle at 50% 52%, rgba(247, 198, 107, 0.05), transparent 28rem);
}

.map-orbit {
  position: absolute;
  inset: 11% 7%;
  border: 1px solid rgba(247, 198, 107, 0.08);
  border-radius: 50%;
  opacity: 0.8;
}

.map-orbit::before,
.map-orbit::after {
  position: absolute;
  inset: 14% 5%;
  border: 1px solid rgba(247, 198, 107, 0.06);
  border-radius: 50%;
  content: "";
}

.map-orbit::after {
  inset: 5% 18%;
}

.map-panel {
  position: absolute;
  inset: clamp(5.5rem, 12vh, 7rem) clamp(1rem, 5vw, 4rem) clamp(1rem, 4vw, 3rem);
}

.prayer-map {
  width: 100%;
  height: 100%;
}

.land {
  fill: rgba(118, 82, 56, 0.44);
  stroke: rgba(255, 244, 221, 0.1);
  stroke-width: 2;
}

.land-europe,
.land-africa,
.land-asia {
  fill: rgba(139, 92, 56, 0.5);
}

.map-markers {
  position: absolute;
  inset: 0;
}

.map-marker {
  position: absolute;
  width: var(--marker-size, 1rem);
  height: var(--marker-size, 1rem);
  border: 0;
  padding: 0;
  border-radius: 50%;
  color: var(--vs-cream);
  background: transparent;
  transform: translate(-50%, -50%);
  cursor: pointer;
}

.map-marker::before {
  position: absolute;
  inset: 18%;
  content: "";
  border-radius: 50%;
  background: radial-gradient(circle, #fff4b4 0 14%, var(--vs-gold) 28%, var(--vs-amber) 54%, rgba(229, 139, 56, 0.12) 72%, transparent 74%);
  box-shadow: 0 0 0.65rem rgba(247, 198, 107, var(--marker-glow, 0.36));
}

.map-marker.unlit::before {
  background: radial-gradient(circle, rgba(247, 198, 107, 0.65), rgba(156, 132, 109, 0.3) 48%, transparent 72%);
  box-shadow: 0 0 0.7rem rgba(247, 198, 107, 0.16);
}

.map-marker.tier-paid::before {
  box-shadow: 0 0 1rem rgba(247, 198, 107, 0.46);
}

.map-marker.is-owned {
  outline: 2px solid rgba(247, 198, 107, 0.62);
  outline-offset: 0.4rem;
  box-shadow: 0 0 1.1rem rgba(247, 198, 107, 0.24);
}

.map-marker::after {
  position: absolute;
  inset: -1.05rem;
  border-radius: 50%;
  content: "";
  background: radial-gradient(circle, rgba(247, 198, 107, 0.1), transparent 64%);
}

.map-count {
  position: absolute;
  left: 50%;
  top: 50%;
  z-index: 2;
  transform: translate(-50%, -50%);
  color: #241306;
  font-size: 0.68rem;
  font-weight: 800;
  line-height: 1;
  pointer-events: none;
}

.map-marker.unlit .map-count {
  color: rgba(255, 244, 221, 0.74);
}

.area-marker .candle-meta {
  width: min(12rem, 44vw);
}

.map-marker:focus-visible {
  outline: 2px solid var(--vs-focus);
  outline-offset: 0.45rem;
}

.map-marker .candle-meta {
  bottom: calc(100% + 0.55rem);
}

.map-marker:hover .candle-meta,
.map-marker:focus-visible .candle-meta {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.wall-environment::before {
  position: fixed;
  inset: 0;
  content: "";
  pointer-events: none;
  background:
    linear-gradient(90deg, rgba(0, 0, 0, 0.72), transparent 18%, transparent 82%, rgba(0, 0, 0, 0.76)),
    linear-gradient(180deg, rgba(4, 10, 17, 0.32), transparent 35%, rgba(0, 0, 0, 0.22)),
    radial-gradient(circle at 50% 58%, transparent 44%, rgba(0, 0, 0, 0.4));
}

.wall-environment::after {
  position: fixed;
  inset: 0;
  content: "";
  pointer-events: none;
  opacity: 0.18;
  background-image:
    radial-gradient(circle at 18% 32%, rgba(255, 244, 221, 0.045) 0 1px, transparent 1px),
    radial-gradient(circle at 72% 68%, rgba(0, 0, 0, 0.18), transparent 16rem);
  background-size: 38px 38px, auto;
}

.shelf-plane {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 0;
  width: 220vw;
}

.shelf {
  position: absolute;
  left: 50%;
  width: 100%;
  height: 6rem;
  transform: translateX(-50%);
  perspective: 56rem;
}

.shelf::before {
  position: absolute;
  left: -5vw;
  right: -5vw;
  bottom: 0.12rem;
  height: 1.05rem;
  content: "";
  background:
    radial-gradient(ellipse at 52% 0%, rgba(255, 244, 221, 0.12), transparent 54%),
    linear-gradient(180deg, #7f7569, #322c27 62%, #15100d 100%);
  background-size: auto, auto;
  box-shadow: 0 1.1rem 1.6rem rgba(0, 0, 0, 0.58), 0 -0.45rem 0.95rem rgba(240, 53, 36, 0.08);
  transform: rotateX(42deg);
  transform-origin: bottom;
}

.shelf::after {
  position: absolute;
  left: -5vw;
  right: -5vw;
  bottom: 1rem;
  height: 4.4rem;
  content: "";
  background:
    linear-gradient(90deg, rgba(0, 0, 0, 0.32), transparent 16%, transparent 84%, rgba(0, 0, 0, 0.34)),
    radial-gradient(ellipse at 50% 100%, rgba(240, 53, 36, 0.12), transparent 48%);
  background-size: auto, auto;
  pointer-events: none;
}

.candle {
  position: absolute;
  bottom: 0.98rem;
  width: var(--candle-width, 3rem);
  height: var(--candle-height, 5.7rem);
  min-width: 2.75rem;
  border: 0;
  padding: 0;
  color: inherit;
  background: transparent;
  transform: translateX(-50%) translateY(var(--lift, 0));
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: pan-x;
}

.candle:focus-visible {
  outline: 2px solid var(--vs-focus);
  outline-offset: 0.45rem;
  border-radius: 0.5rem;
}

.candle-body {
  position: absolute;
  left: 50%;
  bottom: 0;
  width: 82%;
  height: 78%;
  transform: translateX(-50%);
  border-radius: 0.34rem 0.34rem 0.18rem 0.18rem;
  background:
    linear-gradient(90deg, rgba(255, 255, 255, 0.32), rgba(255, 255, 255, 0.08) 23%, rgba(30, 10, 8, 0.2) 72%, rgba(0, 0, 0, 0.26)),
    linear-gradient(180deg, var(--glass-top, rgba(255, 96, 65, 0.82)), var(--glass-mid, rgba(169, 25, 20, 0.9)) 48%, var(--glass-base, rgba(67, 8, 8, 0.96)));
  box-shadow: inset 0 0.45rem 0.5rem rgba(255, 214, 158, 0.18), inset 0 -0.55rem 0.8rem rgba(41, 0, 0, 0.42), 0 0.7rem 0.65rem rgba(0, 0, 0, 0.42);
}

.candle-body::before {
  position: absolute;
  top: -0.2rem;
  left: 0;
  right: 0;
  height: 0.66rem;
  border-radius: 50%;
  content: "";
  background: radial-gradient(ellipse at 50% 52%, rgba(30, 8, 6, 0.58) 0 19%, var(--glass-top, rgba(255, 105, 72, 0.74)) 20% 68%, var(--glass-base, rgba(122, 13, 10, 0.92)) 100%);
  box-shadow: inset 0 0 0.35rem rgba(255, 235, 185, 0.22);
}

.wick {
  position: absolute;
  left: 50%;
  bottom: 73%;
  width: 0.12rem;
  height: 0.58rem;
  transform: translateX(-50%);
  border-radius: 999px;
  background: #281611;
  z-index: 2;
}

.flame {
  position: absolute;
  left: 50%;
  bottom: calc(78% + 0.18rem);
  width: 0.78rem;
  height: 1.32rem;
  transform: translateX(-50%) rotate(3deg);
  border-radius: 65% 35% 58% 42% / 72% 48% 52% 28%;
  background: radial-gradient(circle at 48% 68%, #fff8bd 0 18%, #f7c66b 26%, #ef8a30 58%, rgba(229, 91, 25, 0.06) 72%);
  box-shadow: 0 0 0.42rem rgba(247, 198, 107, 0.38);
  filter: none;
  transform-origin: 50% 100%;
  animation: flame-flicker 3.8s infinite ease-in-out;
}

.candle.active::before {
  position: absolute;
  left: 50%;
  bottom: 31%;
  width: 3.2rem;
  height: 3.2rem;
  transform: translateX(-50%);
  border-radius: 50%;
  content: "";
  background: radial-gradient(circle, rgba(var(--glow-rgb, 240, 53, 36), var(--glow, 0.16)), rgba(247, 198, 107, 0.06) 34%, transparent 72%);
}

.candle.tier-paid {
  z-index: 2;
}

.candle.tier-free {
  opacity: 0.9;
}

.candle.tier-free .candle-body {
  height: 72%;
}

.candle.tier-paid .flame {
  width: 0.9rem;
  height: 1.48rem;
  box-shadow: 0 0 0.65rem rgba(247, 198, 107, 0.56);
}

.candle.tier-paid .candle-body {
  box-shadow: inset 0 0.45rem 0.5rem rgba(255, 214, 158, 0.24), inset 0 -0.55rem 0.8rem rgba(41, 0, 0, 0.42), 0 0.9rem 0.8rem rgba(0, 0, 0, 0.46), 0 0 0.85rem rgba(var(--glow-rgb, 240, 53, 36), 0.12);
}

.candle.expired-free {
  opacity: 0.48;
  filter: saturate(0.55);
}

.candle.expired-free .candle-body {
  box-shadow: inset 0 0.3rem 0.45rem rgba(255, 214, 158, 0.08), inset 0 -0.55rem 0.8rem rgba(22, 8, 7, 0.58), 0 0.65rem 0.7rem rgba(0, 0, 0, 0.48);
}

.candle.expired-free:hover,
.candle.expired-free:focus-visible {
  opacity: 0.72;
}

.candle.back-ember .flame {
  display: block;
  width: 0.46rem;
  height: 0.7rem;
  bottom: calc(72% + 0.12rem);
  opacity: 0.64;
  box-shadow: 0 0 0.32rem rgba(247, 198, 107, 0.26);
  animation: none;
}

.candle.back-ember::before {
  position: absolute;
  left: 50%;
  bottom: 28%;
  width: 2.2rem;
  height: 2.2rem;
  transform: translateX(-50%);
  border-radius: 50%;
  content: "";
  background: radial-gradient(circle, rgba(var(--glow-rgb, 240, 53, 36), 0.08), transparent 70%);
}

.candle.is-owned .candle-body {
  outline: 2px solid rgba(247, 198, 107, 0.74);
  outline-offset: 0.16rem;
  box-shadow: inset 0 0.45rem 0.5rem rgba(255, 214, 158, 0.26), inset 0 -0.55rem 0.8rem rgba(41, 0, 0, 0.42), 0 0.85rem 0.75rem rgba(0, 0, 0, 0.46), 0 0 1.15rem rgba(247, 198, 107, 0.28);
}

.candle.is-owned::after {
  position: absolute;
  left: 50%;
  bottom: -0.18rem;
  width: 92%;
  height: 0.22rem;
  transform: translateX(-50%);
  border-radius: 999px;
  content: "";
  background: rgba(247, 198, 107, 0.54);
  box-shadow: 0 0 0.85rem rgba(247, 198, 107, 0.42);
  pointer-events: none;
}

.candle.unlit .flame {
  display: none;
}

.candle.unlit.back-ember .flame {
  display: block;
}

.candle.unlit .candle-body {
  background:
    linear-gradient(90deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.035) 35%, rgba(0, 0, 0, 0.3) 84%),
    linear-gradient(180deg, color-mix(in srgb, var(--glass-top, rgba(129, 52, 43, 0.72)) 64%, #1a1110), color-mix(in srgb, var(--glass-mid, rgba(78, 24, 23, 0.86)) 58%, #100b0a) 58%, #1a100f);
}

.candle-meta {
  position: absolute;
  left: 50%;
  bottom: calc(100% + 0.75rem);
  z-index: 8;
  width: min(13rem, 42vw);
  padding: 0.7rem 0.8rem;
  border: 1px solid rgba(255, 244, 221, 0.13);
  border-radius: 0.45rem;
  color: var(--vs-cream);
  background: rgba(18, 10, 7, 0.82);
  box-shadow: 0 1rem 2rem rgba(0, 0, 0, 0.3);
  backdrop-filter: blur(14px);
  opacity: 0;
  transform: translateX(-50%) translateY(0.35rem);
  pointer-events: none;
  transition: opacity 160ms ease, transform 160ms ease;
  text-align: left;
}

.candle:hover .candle-meta,
.candle:focus-visible .candle-meta {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.candle-meta strong {
  display: block;
  margin-bottom: 0.1rem;
  font-size: 0.85rem;
}

.candle-meta span,
.candle-meta em {
  display: block;
  color: var(--vs-muted);
  font-size: 0.74rem;
  font-style: normal;
  line-height: 1.35;
}

.sheet-note {
  color: rgba(255, 244, 221, 0.82);
}

.upgrade-button {
  width: 100%;
  min-height: 2.55rem;
  margin-top: 0.65rem;
  border: 1px solid rgba(247, 198, 107, 0.28);
  border-radius: 999px;
  color: #1d1209;
  background: linear-gradient(180deg, #f7c66b, #d88a36);

const searchInput = document.querySelector("#search-input");
const statusFilter = document.querySelector("#status-filter");
const countryFilter = document.querySelector("#country-filter");
const sheet = document.querySelector("#detail-sheet");
const sheetScrim = document.querySelector("#sheet-scrim");
const sheetClose = document.querySelector("#sheet-close");
const viewToggle = document.querySelector("#view-toggle");
const wallEnvironment = document.querySelector(".wall-environment");
const mapView = document.querySelector("#map-view");
const mapMarkers = document.querySelector("#map-markers");
const candlePage = document.querySelector(".candle-page");
let currentView = "wall";
let isDraggingWall = false;
let hasDraggedWall = false;
let dragStartX = 0;
let dragStartScroll = 0;
let resizeFrame = 0;
let wallCentered = false;

const mapPositions = {
  "United States": [25, 41],
  Canada: [24, 29],
  Mexico: [24, 55],
  Chile: [34, 82],
  Brazil: [43, 69],
  Ireland: [47, 32],
  "United Kingdom": [49, 34],
  France: [51, 39],
  Spain: [49, 46],
  Germany: [54, 35],
  Greece: [57, 44],
  Italy: [55, 43],
  Morocco: [50, 53],
  Egypt: [59, 56],
  Kenya: [62, 68],
  Nigeria: [54, 63],
  Jordan: [63, 51],
  Lebanon: [61, 49],
  India: [72, 57],
  Japan: [88, 43],
  "South Korea": [84, 44],
  Philippines: [82, 60],
  Australia: [84, 80],
  "New Zealand": [92, 86]
};

function uniqueCountries() {
  return [...new Set(candles.map((candle) => candle.country))].sort();
}

function populateCountries() {
  uniqueCountries().forEach((country) => {
    const option = document.createElement("option");
    option.value = country;
    option.textContent = country;
    countryFilter.append(option);
  });
}

function getFilteredCandles() {
  const query = searchInput.value.trim().toLowerCase();
  const status = statusFilter.value;
  const country = countryFilter.value;

  return candles.filter((candle) => {
    const matchesQuery = [candle.name, candle.country, candle.intention, candle.time]
      .join(" ")
      .toLowerCase()
      .includes(query);
    const matchesStatus = status === "all" || (status === "active" ? candle.active : !candle.active);
    const matchesCountry = country === "all" || candle.country === country;
    return matchesQuery && matchesStatus && matchesCountry;
  });
}

function createCandle(candle, index, x, rowIndex = 0) {
  const button = document.createElement("button");
  const isOwned = candle.ownerId === currentUserId;
  const isPaid = candle.tier === "paid";
  const isExpiredFree = candle.tier === "free" && candle.expired;
  const isBackRow = rowIndex <= 1;
  const hasBackEmber = candle.tier === "free" && isBackRow && index % 5 === 0;
  const status = candle.active ? "active" : "unlit";
  const color = candleColors[index % candleColors.length];
  const baseHeight = 4.8 + ((index * 7) % 18) / 10;
  const baseWidth = 2.35 + ((index * 5) % 10) / 10;
  const height = isPaid ? baseHeight : baseHeight - 0.5;
  const width = isPaid ? baseWidth : baseWidth - 0.18;

  button.type = "button";
  button.className = `candle ${status} tier-${candle.tier}${isExpiredFree ? " expired-free" : ""}${hasBackEmber ? " back-ember" : ""}${isOwned ? " is-owned" : ""}`;
  button.style.left = `${x}%`;
  button.style.setProperty("--candle-height", `${height}rem`);
  button.style.setProperty("--candle-width", `${width}rem`);
  button.style.setProperty("--lift", `${((index % 5) - 2) * 0.11}rem`);
  button.style.setProperty("--glass-top", color.top);
  button.style.setProperty("--glass-mid", color.mid);
  button.style.setProperty("--glass-base", color.base);
  button.style.setProperty("--glow-rgb", color.glow);
  button.style.setProperty("--glow", `${candle.active ? (isPaid ? 0.22 : 0.14) + (index % 5) * 0.02 : hasBackEmber ? 0.08 : 0.035}`);
  button.setAttribute("aria-label", `${isOwned ? "Your candle, " : ""}${candle.name}, ${color.name} ${candle.tier} candle, ${candle.country}, ${isExpiredFree ? "expired free candle" : candle.active ? "active flame" : hasBackEmber ? "faint ember" : "quiet unlit candle"}. ${candle.intention}`);

  button.innerHTML = `
    <span class="flame" aria-hidden="true"></span>
    <span class="wick" aria-hidden="true"></span>
    <span class="candle-body" aria-hidden="true"></span>
    <span class="candle-meta" role="presentation">
      <strong>${isOwned ? "A candle you lit" : candle.name}</strong>
      <span>${color.name} · ${isPaid ? "Paid vigil" : isExpiredFree ? "Free candle expired" : "Free candle"} · ${candle.country}</span>
      <em>${candle.intention}</em>
      ${isExpiredFree ? `<em>Upgrade to keep this vigil lit.</em>` : ""}
    </span>
  `;
  button.addEventListener("click", () => {
    if (hasDraggedWall) return;
    openSheet(candle, color.name);
  });
  return button;
}

function groupCandlesByCountry(candlesForMap) {
  return [...candlesForMap.reduce((groups, candle) => {
    if (!groups.has(candle.country)) {
      groups.set(candle.country, {
        country: candle.country,
        candles: [],
        activeCount: 0,
        paidCount: 0,
        freeCount: 0,
        restingCount: 0
      });
    }
    const group = groups.get(candle.country);
    group.candles.push(candle);
    if (candle.active) group.activeCount += 1;
    if (candle.tier === "paid") group.paidCount += 1;
    if (candle.tier === "free") group.freeCount += 1;
    if (!candle.active) group.restingCount += 1;
    return groups;
  }, new Map()).values()];
}

function createAreaMarker(area, index) {
  const [x, y] = mapPositions[area.country] || [50, 50];
  const hasActive = area.activeCount > 0;
  const markerSize = 1.1 + Math.min(area.activeCount, 9) * 0.13;
  const marker = document.createElement("button");
  marker.type = "button";
  marker.className = `map-marker area-marker ${hasActive ? "active" : "unlit"}${area.paidCount ? " tier-paid" : ""}`;
  marker.style.left = `${x}%`;
  marker.style.top = `${y}%`;
  marker.style.setProperty("--marker-size", `${markerSize}rem`);
  marker.style.setProperty("--marker-glow", `${hasActive ? 0.28 + Math.min(area.activeCount, 8) * 0.035 : 0.12}`);
  marker.setAttribute("aria-label", `${area.country}, ${area.activeCount} lit candles, ${area.restingCount} resting candles.`);
  marker.innerHTML = `
    <span class="map-count" aria-hidden="true">${area.activeCount}</span>
    <span class="candle-meta" role="presentation">
      <strong>${area.country}</strong>
      <span>${area.activeCount} lit · ${area.restingCount} resting</span>
      <em>${area.paidCount} paid vigils · ${area.freeCount} free candles</em>
    </span>
  `;
  marker.addEventListener("click", () => openAreaSheet(area));
  return marker;
}

function renderMap(filtered) {
  mapMarkers.replaceChildren();
  groupCandlesByCountry(filtered).forEach((area, index) => {
    mapMarkers.append(createAreaMarker(area, index));
  });
}

function renderWall() {
  const filtered = getFilteredCandles();
  const rowTemplates = getRowTemplates();
  wall.replaceChildren();
  const shelves = rowTemplates.map((template) => {
    const shelf = document.createElement("div");
    shelf.className = "shelf";
    shelf.style.top = `${template.top}%`;
    wall.append(shelf);
    return shelf;
  });

  rowTemplates
    .flatMap((template, rowIndex) =>
      template.xs.map((x, placeIndex) => ({
        rowIndex,
        placeIndex,
        x,
        distance: Math.abs(x - 50) + Math.abs(rowIndex - 1.7) * 6
      }))
    )
    .sort((a, b) => a.distance - b.distance)
    .sort((a, b) => a.rowIndex - b.rowIndex || a.x - b.x)
    .forEach((slot, index) => {
      if (!filtered.length) return;
      const candle = filtered[index % filtered.length];
      shelves[slot.rowIndex].append(createCandle(candle, slot.rowIndex * 36 + slot.placeIndex, slot.x, slot.rowIndex));
    });

  visibleCount.textContent = String(filtered.length);
  emptyState.hidden = filtered.length > 0;
  renderMap(filtered);
  centerWall();
}

function openSheet(candle, colorName) {
  const isOwned = candle.ownerId === currentUserId;
  const isPaid = candle.tier === "paid";
  const isExpiredFree = candle.tier === "free" && candle.expired;
  document.querySelector("#sheet-status").textContent = isExpiredFree ? "Expired free candle" : isPaid ? "Active paid vigil" : candle.active ? "Active free candle" : "Quiet candle";
  document.querySelector("#sheet-title").textContent = isOwned ? "A candle you lit" : candle.name;
  document.querySelector("#sheet-meta").textContent = `${colorName ? `${colorName} · ` : ""}${candle.country} · ${candle.time}`;
  document.querySelector("#sheet-intention").textContent = candle.intention;
  document.querySelector("#sheet-note").textContent = isOwned
    ? isExpiredFree
      ? "This free candle has completed its day on the wall. Upgrade it to keep the vigil alive."
      : "You lit this candle."
    : isExpiredFree
      ? "This free candle has completed its day and now rests on the wall."
      : isPaid
        ? "This paid vigil remains active and held in prayer."
        : "";
  document.querySelector("#upgrade-button").hidden = !(isOwned && isExpiredFree);
  sheet.setAttribute("aria-hidden", "false");
  sheetScrim.hidden = false;
}

function openAreaSheet(area) {
  document.querySelector("#sheet-status").textContent = "Prayer area";
  document.querySelector("#sheet-title").textContent = area.country;
  document.querySelector("#sheet-meta").textContent = `${area.activeCount} lit candles · ${area.restingCount} resting`;
  document.querySelector("#sheet-intention").textContent = `${area.paidCount} paid vigils and ${area.freeCount} free candles are being held from this area.`;
  document.querySelector("#sheet-note").textContent = area.activeCount
    ? "The marker size and glow reflect the number of candles currently lit here."
    : "No candles are currently lit here, but resting candles remain visible in the wall.";
  document.querySelector("#upgrade-button").hidden = true;
  sheet.setAttribute("aria-hidden", "false");
  sheetScrim.hidden = false;
}

function closeSheet() {
  sheet.setAttribute("aria-hidden", "true");
  sheetScrim.hidden = true;
}

function markEngaged() {
  candlePage.classList.add("is-engaged");
}

function isMobileWall() {
  return window.matchMedia("(max-width: 820px)").matches;
}

function centerWall(force = false) {
  if (wallCentered && !force) return;
  wallEnvironment.scrollLeft = Math.max(0, (wallEnvironment.scrollWidth - wallEnvironment.clientWidth) / 2);
  wallCentered = true;
}

function startWallDrag(event) {
  if (currentView !== "wall" || isMobileWall()) return;
  markEngaged();
  isDraggingWall = true;
  hasDraggedWall = false;
  dragStartX = event.clientX;
  dragStartScroll = wallEnvironment.scrollLeft;
  wallEnvironment.classList.add("is-dragging");
  wallEnvironment.setPointerCapture?.(event.pointerId);
}

function moveWallDrag(event) {
  if (!isDraggingWall || isMobileWall()) return;
  event.preventDefault();
  const deltaX = event.clientX - dragStartX;
  if (Math.abs(deltaX) > 6) hasDraggedWall = true;
  wallEnvironment.scrollLeft = dragStartScroll - deltaX;
}

function endWallDrag(event) {
  if (!isDraggingWall) return;
  isDraggingWall = false;
  wallEnvironment.classList.remove("is-dragging");
  wallEnvironment.releasePointerCapture?.(event.pointerId);
  window.setTimeout(() => {
    hasDraggedWall = false;
  }, 0);
}

filtersToggle.addEventListener("click", () => {
  markEngaged();
  const isHidden = filtersPanel.hidden;
  filtersPanel.hidden = !isHidden;
  filtersToggle.setAttribute("aria-expanded", String(isHidden));
  if (isHidden) searchInput.focus();
});

viewToggle.addEventListener("click", () => {
  markEngaged();
  currentView = currentView === "wall" ? "map" : "wall";
  const showingMap = currentView === "map";
  wallEnvironment.hidden = showingMap;
  mapView.hidden = !showingMap;
  viewToggle.textContent = showingMap ? "Wall View" : "Map View";
  viewToggle.setAttribute("aria-pressed", String(showingMap));
});

[searchInput, statusFilter, countryFilter].forEach((control) => {
  control.addEventListener("input", () => {
    markEngaged();
    renderWall();
  });
});

wallEnvironment.addEventListener("pointerdown", markEngaged);
wallEnvironment.addEventListener("pointerdown", startWallDrag);
wallEnvironment.addEventListener("pointermove", moveWallDrag);
wallEnvironment.addEventListener("pointerup", endWallDrag);
wallEnvironment.addEventListener("pointercancel", endWallDrag);
mapView.addEventListener("pointerdown", markEngaged);

sheetClose.addEventListener("click", closeSheet);
sheetScrim.addEventListener("click", closeSheet);
window.addEventListener("keydown", (event) => {
  if (event.key === "Escape") closeSheet();
  const target = event.target;
  const isTyping = target instanceof HTMLInputElement || target instanceof HTMLSelectElement || target instanceof HTMLTextAreaElement;
  if (currentView !== "wall" || isTyping) return;
  if (event.key === "ArrowLeft") {
    event.preventDefault();
    markEngaged();
    wallEnvironment.scrollBy({ left: -140, behavior: "smooth" });
  }
  if (event.key === "ArrowRight") {
    event.preventDefault();
    markEngaged();
    wallEnvironment.scrollBy({ left: 140, behavior: "smooth" });
  }
});
window.addEventListener("resize", () => {
  window.cancelAnimationFrame(resizeFrame);
  resizeFrame = window.requestAnimationFrame(() => {
    wallCentered = false;
    renderWall();
    centerWall(true);
  });
});

populateCountries();
renderWall();
centerWall(true);

</script>
  </body>
</html>
